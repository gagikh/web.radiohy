<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armenian Radio Stations | Live</title>
  <meta name="description" content="Live Armenian radio stations — search, filter by country, and stream directly in your browser.">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/gagikh/xbmc.plugin.audio.radiohy/master/icon.png">
  <link rel="stylesheet" href="stations.css?v=5">
</head>
<body>

  <header>
    <h1 class="site-title">
      <a href="index.html" id="nav-home">Armenian Radio Stations</a>
    </h1>
    <div class="header-controls">
      <input type="search" id="search" placeholder="Search stations..." autocomplete="off">
      <select id="country-filter">
        <option value="">All countries</option>
      </select>
    </div>
    <nav>
      <a href="#contact" id="nav-contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="stations-view">
      <h2 class="page-heading">Radio stations</h2>
      <div id="station-list" role="list">
        <p class="loading">Loading stations...</p>
      </div>
    </section>

    <section id="contact-view" hidden>
      <h2 class="page-heading">Contact</h2>
      <div class="page-content">
        <p lang="hy">Հայերեն հեռարձակվող ռադիոկայաններ, հավաքել եմ այնքան, որքան կարողացել եմ&nbsp;😊</p>
        <p lang="hy">Գրեք հեղինակին և տեղեկացրեք նոր կայանի մասին՝
        <a href="https://github.com/gagikh/xbmc.plugin.audio.radiohy/issues" target="_blank" rel="noopener noreferrer">GitHub Issues</a>
        կամ <a href="mailto:hakgagik@yahoo.com">hakgagik@yahoo.com</a>
        </p>
      </div>
    </section>
  </main>

  <div id="now-playing" hidden>
    <div class="np-info">
      <span class="np-label">Now playing</span>
      <span id="np-name"></span>
    </div>
    <audio id="player" preload="none"></audio>
    <div class="np-controls">
      <button type="button" id="np-pause" class="np-btn" aria-label="Pause">
        <svg class="np-icon np-icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/>
        </svg>
        <svg class="np-icon np-icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" hidden>
          <path d="M8 5v14l11-7L8 5z"/>
        </svg>
      </button>
      <button type="button" id="np-stop" class="np-btn" aria-label="Stop">
        <svg class="np-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6 6h12v12H6V6z"/>
        </svg>
      </button>
    </div>
    <div class="np-volume">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1" aria-label="Volume">
    </div>
  </div>

  <script src="stations.js?v=5"></script>
</body>
</html>
